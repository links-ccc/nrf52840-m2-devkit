# West manifest for the minimal nRF52840 M.2 Developer Kit application.
#
# nRF Connect SDK v3.4.0-rc1 is the Nordic SDK tag whose downstream
# sdk-zephyr tag is Zephyr 4.4.0. Import Zephyr and the Nordic modules through
# the NCS manifest so their Kconfig/CMake dependencies stay version-aligned.

manifest:
  version: "0.13"

  remotes:
    - name: ncs
      url-base: https://github.com/nrfconnect

  defaults:
    remote: ncs

  projects:
    - name: zephyr
      repo-path: sdk-zephyr
      revision: ncs-v3.4.0-rc1
      clone-depth: 1
      import:
        name-allowlist:
          - cmsis
          - cmsis_6
          - hal_nordic
          - hostap
          - picolibc
          - segger
          - tf-psa-crypto
          - zcbor
    - name: nrf
      repo-path: sdk-nrf
      revision: v3.4.0-rc1
      path: nrf
      clone-depth: 1
      west-commands: scripts/west-commands.yml
      import:
        name-allowlist:
          - mbedtls
          - mcuboot
          - nrfxlib
          - oberon-psa-crypto

  self:
    path: nrf52840-m2-devkit
